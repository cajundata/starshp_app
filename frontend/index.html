<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><title>Starshp</title></head>
<body>
  <div id="app">
    <aside id="sidebar">
      <button id="newChat">+ New chat</button>
      <button id="asgBtn">📂 Assignments</button>
      <button id="pipelineBtn">🎯 Pipeline <span id="reviewsDueBadge" class="badge hidden">0</span></button>
      <div class="cap">History</div>
      <div id="convList"></div>
    </aside>
    <main id="main">
      <div id="thread"></div>
      <div id="ctxFooter" class="ctx-footer hidden"></div>
      <div id="composer">
        <textarea id="input" placeholder="Message…" rows="3"></textarea>
        <div id="toolbar">
          <div class="left">
            <select id="modelSel"></select>
            <button id="libBtn">≡ Library</button>
            <button id="tbBtn">📚 Textbooks</button>
          </div>
          <button id="sendBtn">Send ▸</button>
        </div>
      </div>
    </main>
  </div>
  <div id="asgView" class="hidden">
    <div id="asgBar">
      <button id="asgBack">← Chat</button>
      <span id="asgBarTitle">Assignments</span>
      <span class="spacer"></span>
      <button id="asgSolveBtn">+ Solve a folder…</button>
      <button id="asgStopBtn" class="hidden">Stop ◼</button>
    </div>
    <div id="asgBody">
      <div id="asgListPane">
        <div id="asgHeader"></div>
        <div id="asgItems" class="assignment-list"></div>
      </div>
      <div id="asgDetail"></div>
    </div>
  </div>
  <div id="pipelineView" class="hidden">
    <div id="pipelineBar">
      <button id="pipelineBack">← Chat</button>
      <span id="pipelineBarTitle">Pipeline</span>
      <span class="spacer"></span>
      <button id="pipelineNewBtn">+ New idea</button>
    </div>
    <div id="reviewsDuePanel" class="hidden"></div>
    <div id="pipelineBody">
      <div id="ideaListPane"><div id="ideaList"></div></div>
      <div id="ideaDetail"></div>
    </div>
  </div>
  <div id="tbModal" class="hidden"><div id="tbModalInner"></div></div>
  <div id="libModal" class="hidden"><div id="libModalInner"></div></div>
  <div id="editorView" class="hidden">
    <div id="editorBar">
      <button id="editorBack">← Library</button>
      <span id="editorTitle">New item</span>
      <span id="editorMsg"></span>
      <span class="spacer"></span>
      <button id="editorDelete" class="hidden">Delete</button>
      <button id="editorSave">Save</button>
    </div>
    <textarea id="editorArea" spellcheck="false"
      placeholder="# Item name&#10;&#10;Write the prompt or context in markdown…"></textarea>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
