# models.example.yaml — template for the model registry.
#
# Copy this into your app directory as `models.yaml` and edit it. The app
# directory is %APPDATA%\starshp_app on Windows, ~/.config/starshp_app on
# Linux, ~/Library/Application Support/starshp_app on macOS. Override it with
# the STARSHP_HOME environment variable.
#
# Each entry needs:
#   display     — human-readable name shown in the UI
#   id          — the provider's model identifier sent on API calls
#   provider    — "anthropic", "openai", "gemini", or "openai_compat" (Ollama /
#                 LM Studio / vLLM / any OpenAI-Chat-Completions-compatible
#                 local server; also set base_url, and optionally api_key_env)
#   max_context — (optional) context-window size in tokens; supplies the
#                 denominator in the conversation footer HUD. Omit to display
#                 absolute tokens with no denominator.
#   reasoning_effort — (optional, openai/openai_compat only) forwarded
#                 verbatim; set "none" for models that reject function tools
#                 with reasoning on /v1/chat/completions (e.g. GPT-5.6 Sol)
#   input_modalities  — (optional) what the model accepts. Default [text].
#   output_modalities — (optional) what the model produces. Default [text].
#                 Both are lists drawn from the closed set "text" | "image" —
#                 any other value is rejected at load. The app is text-only
#                 today: a persona pinned to a model whose output_modalities
#                 does not include "text" is disabled at startup (see the
#                 startup-issues banner) until image output ships (e.g. Nano
#                 Banana 2). Declaring input_modalities: [text, image] on a
#                 model that also accepts image input costs nothing now — it
#                 documents the model's real capability ahead of image-input
#                 personas.
models:
  - display: Claude Fable 5
    id: claude-fable-5
    provider: anthropic
    max_context: 1000000
  - display: Claude Opus 4.8
    id: claude-opus-4-8
    provider: anthropic
    max_context: 1000000
  - display: Claude Opus 4.7
    id: claude-opus-4-7
    provider: anthropic
    max_context: 1000000
  - display: Claude Sonnet 4.6
    id: claude-sonnet-4-6
    provider: anthropic
    max_context: 200000
  - display: Claude Haiku 4.5
    id: claude-haiku-4-5-20251001
    provider: anthropic
    max_context: 200000
  - display: GPT-5.6 Sol
    id: gpt-5.6-sol
    provider: openai
    max_context: 400000
    # GPT-5.6 Sol rejects function tools when reasoning is active on
    # /v1/chat/completions — "none" keeps tool-carrying personas working.
    reasoning_effort: none
  - display: GPT-5.4
    id: gpt-5.4-2026-03-05
    provider: openai
    max_context: 400000
  - display: Gemini 3 Pro
    id: gemini-3-pro
    provider: gemini
    max_context: 1000000
    # Gemini 3 Pro accepts image input today even though the app has no
    # image-input persona yet; output stays text (explicit here just to show
    # the syntax — it matches the default).
    input_modalities: [text, image]
    output_modalities: [text]
  - display: Gemini 3 Flash
    id: gemini-3-flash
    provider: gemini
    max_context: 1000000
  - display: Gemini 3.1 Flash Lite
    id: gemini-3.1-flash-lite
    provider: gemini
    max_context: 1048576

  # ---------------------------------------------------------------------------
  # Local model via Ollama (https://ollama.com).
  # Install Ollama on your OS, run `ollama pull llama3.2`, then uncomment:
  # ---------------------------------------------------------------------------
  # - display: Llama 3.2 (local)
  #   id: llama3.2
  #   provider: openai_compat
  #   base_url: http://localhost:11434/v1
  #   max_context: 131072
